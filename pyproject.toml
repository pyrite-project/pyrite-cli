[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.build_meta:__legacy__"

[project]
name = "pyrite-cli"
version = "0.0.1"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.9.0",
    "pyserial>=3.5",
    "requests>=2.28.0",
    "tqdm>=4.64.0",
]

[project.scripts]
pyrcli = "cli.main:main"

[tool.setuptools.packages.find]
include = ["cli", "cli.*", "utils", "utils.*", "project", "project.*"]
